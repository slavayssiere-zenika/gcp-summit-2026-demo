[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = --tb=short -q
markers =
    integration: Tests d'intégration nécessitant Docker + émulateur Pub/Sub (toujours actifs)
filterwarnings =
    ignore:.*authlib.jose module is deprecated.*:Warning
asyncio_mode = auto

[mutmut]
paths_to_mutate = src/
tests_dir = tests/
also_copy =
    conftest.py
    database.py
    main.py
pytest_add_cli_args = -q
