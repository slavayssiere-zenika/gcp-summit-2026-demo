# ══════════════════════════════════════════════════════════
# Environnement : UAT — staging de validation
# ══════════════════════════════════════════════════════════

# ── GCP ───────────────────────────────────────────────────
project_id:                "slavayssiere-sandbox-462015"
base_domain:               "zenika.slavayssiere.fr"
parent_zone_name:          "slavayssiere-zenika"
parent_zone_project_id:    "slavayssiere-sandbox-462015"  # Obligatoire depuis P2-2 (plus de défault dans variables.tf)

# ── Registre d'images ─────────────────────────────────────
# manage_env.py assemble : {image_registry}/{service}:{version déclarée ci-dessous}
image_registry: "europe-west1-docker.pkg.dev/slavayssiere-sandbox-462015/z-gcp-summit-services"

# ── Versions des services (priorité sur les fichiers VERSION locaux) ──────────
# Déclarez ici les versions à déployer en UAT pour épingler une release précise.
# Laisser la valeur vide ("") ou supprimer la ligne → utilise le fichier VERSION local.
agent_router_api_version:   "v0.1.0"
agent_hr_api_version:       "v0.0.50"
agent_ops_api_version:      "v0.0.50"
agent_missions_api_version: "v0.0.50"
users_api_version:          "v0.0.50"
items_api_version:          "v0.0.50"
competencies_api_version:   "v0.0.50"
cv_api_version:             "v0.0.50"
prompts_api_version:        "v0.0.50"
drive_api_version:          "v0.0.50"
market_mcp_version:         "v0.0.50"
db_migrations_version:      "v0.0.50"
missions_api_version:       "v0.0.50"
frontend_version:           "v0.0.50"

# ── Cloud Run ─────────────────────────────────────────────
cloudrun_min_instances: 1
cloudrun_max_instances: 5

# ── AlloyDB ───────────────────────────────────────────────
alloydb_cpu: 2

# ── Sécurité / WAF ────────────────────────────────────────
waf_rate_limit: 1000

# ── Administration ─────────────────────────────────────────
admin_user:               "sebastien.lavayssiere@zenika.com"
finops_anomaly_threshold: 500000

# ── IA / Modèles ──────────────────────────────────────────
gemini_model:           "gemini-3.1-flash-lite-preview"
gemini_embedding_model: "gemini-embedding-001"   # SEC-F06 Semantic Cache
