# ══════════════════════════════════════════════════════════
# Environnement : PRD — production
# ══════════════════════════════════════════════════════════

# ── GCP ───────────────────────────────────────────────────
project_id:       "prod-ia-staffing"
base_domain:      "zenika.slavayssiere.fr"
parent_zone_name: "slavayssiere-zenika"

# ── Registre d'images ─────────────────────────────────────
# manage_env.py assemble : {image_registry}/{service}:{version déclarée ci-dessous}
image_registry: "europe-west1-docker.pkg.dev/slavayssiere-sandbox-462015/z-gcp-summit-services"

# ── Versions des services (priorité sur les fichiers VERSION locaux) ──────────
# Déclarez ici les versions à déployer en production pour épingler une release précise.
# Laisser la valeur vide ("") ou supprimer la ligne → utilise le fichier VERSION local.
agent_router_api_version:   "v0.1.3"
agent_hr_api_version:       "v0.0.64"
agent_ops_api_version:      "v0.0.35"
agent_missions_api_version: "v0.1.10"
users_api_version:          "v0.0.35"
items_api_version:          "v0.0.25"
competencies_api_version:   "v0.1.7"
cv_api_version:             "v0.0.50"
prompts_api_version:        "v0.0.21"
drive_api_version:          "v0.0.32"
market_mcp_version:         "v0.0.57"
monitoring_mcp_version:     "v0.0.57"
db_migrations_version:      "v0.0.10"
missions_api_version:       "v0.0.43"
frontend_version:           "v0.0.90"

# ── Cloud Run ─────────────────────────────────────────────
cloudrun_min_instances: 2
cloudrun_max_instances: 50

# ── AlloyDB ───────────────────────────────────────────────
alloydb_cpu: 8   # 8 vCPU pour supporter la charge production

# ── Sécurité / WAF ────────────────────────────────────────
waf_rate_limit: 10000

# ── Administration ─────────────────────────────────────────
admin_user:               "sebastien.lavayssiere@zenika.com"
finops_anomaly_threshold: 500000

# ── IA / Modèles ──────────────────────────────────────────
gemini_model:           "gemini-3.1-flash-lite-preview"
gemini_embedding_model: "gemini-embedding-001"   # SEC-F06 Semantic Cache
