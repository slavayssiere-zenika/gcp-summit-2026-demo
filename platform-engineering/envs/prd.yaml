# ══════════════════════════════════════════════════════════
# Environnement : PRD — production
# ══════════════════════════════════════════════════════════

# ── GCP ───────────────────────────────────────────────────
project_id:                "prod-ia-staffing"
# Domaine principal de la prod : la zone DNS "prd.zenika.slavayssiere.fr" est persistante
# et déléguée automatiquement depuis "slavayssiere-zenika" (sandbox).
# La racine "zenika.slavayssiere.fr" n'est JAMAIS touchée.
base_domain:               "zenika.slavayssiere.fr"
parent_zone_name:          "slavayssiere-zenika"
parent_zone_project_id:    "slavayssiere-sandbox-462015"
bq_location:               "europe-west1"  # Obligatoire depuis P2-2 (plus de défault dans variables.tf)

# ── Registre d'images ─────────────────────────────────────
# manage_env.py assemble : {image_registry}/{service}:{version déclarée ci-dessous}
image_registry: "europe-west1-docker.pkg.dev/slavayssiere-sandbox-462015/z-gcp-summit-services-dev"

# ── Versions des services (priorité sur les fichiers VERSION locaux) ──────────
# Déclarez ici les versions à déployer en production pour épingler une release précise.
# Laisser la valeur vide ("") ou supprimer la ligne → utilise le fichier VERSION local.
agent_router_api_version:   "v0.5.17"
agent_hr_api_version:       "v0.3.15"
agent_ops_api_version:      "v0.2.16"
agent_missions_api_version: "v0.4.19"
users_api_version:          "v0.2.23"
items_api_version:          "v0.1.20"
competencies_api_version:   "v0.2.22"
cv_api_version:             "v0.1.22"
prompts_api_version:        "v0.1.17"
drive_api_version:          "v0.1.16"
analytics_mcp_version:      "v0.1.16"
monitoring_mcp_version:     "v0.1.15"
db_migrations_version:      "v0.0.69"
db_init_version:            "v0.1.3"
missions_api_version:       "v0.1.17"
frontend_version:           "v0.1.9"

# ── Cloud Run ─────────────────────────────────────────────
cloudrun_min_instances: 0
cloudrun_max_instances: 50
cloudrun_concurrency: 80
# Throttling pipeline CV ingestion
# cv_api_max_instances × DB_POOL_SIZE ≤ alloydb_max_connections (~400 avec 2vCPU)
# 8 instances × pool_size=20 = 160 connexions (marge confortable)
cv_api_max_instances: 8
# Nombre de CVs publiés dans Pub/Sub par cycle drive_api (robinet principal)
max_drive_cv_import: 5

# ── AlloyDB ───────────────────────────────────────────────
alloydb_cpu: 2   # 2 vCPU (downscale optimisation coûts)

# ── Sécurité / WAF ────────────────────────────────────────
waf_rate_limit: 10000

# ── Administration ─────────────────────────────────────
admin_user:               "sebastien.lavayssiere@zenika.com"
finops_anomaly_threshold: 500000

# ── IA / Modèles (per-agent, AGENTS.md §1.4) ──────────────────────────────
# Migration 2026-05-12 : gemini-3.1-flash-lite est passé GA (sans -preview).
# gemini-3.1-pro reste en preview (pas encore de version stable 3.1-pro GA).
gemini_router_model:       "gemini-3.5-flash"               # Orchestrateur : raisonnement complexe GA (Gemini 3.5 Flash)
gemini_hr_model:           "gemini-3.1-flash-lite"          # RH : RAG + MCP
gemini_ops_model:          "gemini-3.1-flash-lite"          # Ops : SQL + logs
gemini_missions_model:     "gemini-3.1-flash-lite"          # Missions : matching staffing
gemini_cv_model:           "gemini-3.1-flash-lite"          # CV API : extraction JSON contrainte
gemini_pro_model:          "gemini-2.5-pro"                 # Taxonomy Reduce (Vertex AI Batch — qualite maximale)
gemini_batch_model:        "gemini-2.5-flash"               # Taxonomy Map+Sweep (Vertex AI Batch — 14x moins cher que Pro)
gemini_model:              "gemini-3.1-flash-lite"          # [LEGACY] fallback uniquement
gemini_embedding_model:    "gemini-embedding-001"           # SEC-F06 Semantic Cache

# ── DNS additionnels (prd uniquement) ─────────────────────
# La zone gen-skillz.znk.io est persistante et déléguée depuis
# la zone parente gérée dans le projet sandbox (slavayssiere-sandbox-462015).
# Elle est couverte par le même SSL cert managé et le même Load Balancer.
#
# IMPORTANT : avant le premier déploiement, créez la zone parente
# "znk-io" dans le projet sandbox et configurez les NS chez le registrar znk.io.
#
extra_domains:
  - zone_name:               "gen-skillz"
    dns_name:                "gen-skillz.znk.io."
    parent_zone_project_id:  "prod-ia-staffing"
trace_sampling_rate: 0.1
enable_output_schema: false  # Activer pour output_schema Pydantic (StaffingResponse/MissionAnalysis) comme source de vérité display_type
