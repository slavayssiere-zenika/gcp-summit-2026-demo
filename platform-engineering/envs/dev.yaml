# ══════════════════════════════════════════════════════════
# Environnement : DEV — plateforme éphémère de développement
# ══════════════════════════════════════════════════════════

# ── GCP ─────────────────────────────────────────────────────
project_id:                "slavayssiere-sandbox-462015"
base_domain:               "zenika.slavayssiere.fr"
parent_zone_name:          "slavayssiere-zenika"
parent_zone_project_id:    "slavayssiere-sandbox-462015"
bq_location:               "europe-west1"  # Obligatoire depuis P2-2 (plus de défault dans variables.tf)

# ── Registre d'images ─────────────────────────────────────
# manage_env.py assemble : {image_registry}/{service}:{version}
# Les versions sont lues depuis les fichiers VERSION locaux (mis à jour par deploy.sh)
image_registry: "europe-west1-docker.pkg.dev/slavayssiere-sandbox-462015/z-gcp-summit-services"

# ── Cloud Run ─────────────────────────────────────────────
cloudrun_min_instances: 1
cloudrun_max_instances: 10
cloudrun_concurrency: 500

# ── AlloyDB ───────────────────────────────────────────────
alloydb_cpu: 2   # Minimum pour le type custom AlloyDB

# ── Sécurité / WAF ────────────────────────────────────────
waf_rate_limit: 2000

# ── Administration ─────────────────────────────────────────
admin_user:               "sebastien.lavayssiere@zenika.com"
finops_anomaly_threshold: 500000

# ── IA / Modèles (per-agent, AGENTS.md §1.4) ──────────────────────────────
# Migration 2026-05-12 : gemini-3.1-flash-lite est passé GA (sans -preview).
# gemini-3.1-pro reste en preview (pas de GA 3.1-pro disponible).
gemini_router_model:       "gemini-3.1-pro-preview"         # Orchestrateur : raisonnement complexe (reste preview — pas de GA 3.1-pro)
gemini_hr_model:           "gemini-3.1-flash-lite"          # RH : RAG + MCP
gemini_ops_model:          "gemini-3.1-flash-lite"          # Ops : SQL + logs
gemini_missions_model:     "gemini-3.1-flash-lite"          # Missions : matching staffing
gemini_cv_model:           "gemini-3.1-flash-lite"          # CV API : extraction JSON contrainte
gemini_pro_model:          "gemini-3.1-flash-lite"          # Taxonomy Reduce (batch) — flash-lite en dev (économie)
gemini_batch_model:        "gemini-3.1-flash-lite"          # Taxonomy Map+Sweep (batch) — flash-lite en dev (économie)
gemini_model:              "gemini-3.1-flash-lite"          # [LEGACY] fallback
gemini_embedding_model:    "gemini-embedding-001"           # SEC-F06 Semantic Cache
trace_sampling_rate: 1.0
