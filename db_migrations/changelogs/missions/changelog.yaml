databaseChangeLog:
  - changeSet:
      id: "1"
      author: "system"
      changes:
        - sql:
            dbms: postgresql
            sql: "CREATE EXTENSION IF NOT EXISTS vector;"
        - createTable:
            tableName: missions
            columns:
              - column:
                  name: id
                  type: SERIAL
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: title
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: description
                  type: text
                  constraints:
                    nullable: false
              - column:
                  name: extracted_competencies
                  type: jsonb
              - column:
                  name: competencies_keywords
                  type: varchar[]
              - column:
                  name: proposed_team
                  type: jsonb
              - column:
                  name: semantic_embedding
                  type: vector(3072)
              - column:
                  name: created_at
                  type: timestamp
                  defaultValueComputed: CURRENT_TIMESTAMP
      rollback:
        - dropTable:
            tableName: missions

  - changeSet:
      id: "2"
      author: "system"
      changes:
        - addColumn:
            tableName: missions
            columns:
              - column:
                  name: prefiltered_candidates
                  type: jsonb
      rollback:
        - dropColumn:
            tableName: missions
            columnName: prefiltered_candidates

  - changeSet:
      id: "3"
      author: "system"
      changes:
        - addColumn:
            tableName: missions
            columns:
              - column:
                  name: fallback_full_scan
                  type: boolean
                  defaultValueBoolean: false
      rollback:
        - dropColumn:
            tableName: missions
            columnName: fallback_full_scan

  - changeSet:
      id: "4"
      author: "system"
      comment: "Add mission lifecycle status column"
      changes:
        - addColumn:
            tableName: missions
            columns:
              - column:
                  name: status
                  type: varchar(30)
                  defaultValue: "STAFFED"
                  constraints:
                    nullable: false
      rollback:
        - dropColumn:
            tableName: missions
            columnName: status

  - changeSet:
      id: "5"
      author: "system"
      comment: "Create mission status audit history table"
      changes:
        - createTable:
            tableName: mission_status_history
            columns:
              - column:
                  name: id
                  type: SERIAL
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: mission_id
                  type: integer
                  constraints:
                    nullable: false
                    foreignKeyName: fk_status_history_mission
                    references: missions(id)
              - column:
                  name: old_status
                  type: varchar(30)
                  constraints:
                    nullable: true
              - column:
                  name: new_status
                  type: varchar(30)
                  constraints:
                    nullable: false
              - column:
                  name: reason
                  type: text
                  constraints:
                    nullable: true
              - column:
                  name: changed_by
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: changed_at
                  type: timestamp
                  defaultValueComputed: CURRENT_TIMESTAMP
      rollback:
        - dropTable:
            tableName: mission_status_history

  - changeSet:
      id: "6"
      author: "antigravity"
      comment: "R1 — Versionning modele embedding : trace le modele utilise pour chaque vecteur de mission"
      changes:
        - addColumn:
            tableName: missions
            columns:
              - column:
                  name: embedding_model
                  type: varchar(100)
                  constraints:
                    nullable: true
        - sql:
            sql: "CREATE INDEX IF NOT EXISTS idx_missions_embedding_model ON missions (embedding_model);"
      rollback:
        - sql:
            sql: "DROP INDEX IF EXISTS idx_missions_embedding_model;"
        - dropColumn:
            tableName: missions
            columnName: embedding_model

  - changeSet:
      id: "7"
      author: "antigravity"
      runInTransaction: false
      comment: >
        P1 perf — Index GIN sur proposed_team + B-tree DESC sur created_at.
        Resout le full table scan O(n) sur /missions/user/{id}/active (QueuePool
        exhaustion a 500 users). GIN permet WHERE proposed_team @> '[{"user_id":X}]'
        en O(log n). Index crees CONCURRENTLY pour eviter tout lock table en production.
        runInTransaction: false requis — CREATE INDEX CONCURRENTLY interdit en transaction.
      changes:
        - sql:
            dbms: postgresql
            sql: >-
              CREATE INDEX CONCURRENTLY IF NOT EXISTS idx_missions_proposed_team_gin
              ON missions USING GIN (proposed_team);
        - sql:
            dbms: postgresql
            sql: >-
              CREATE INDEX CONCURRENTLY IF NOT EXISTS idx_missions_created_at_desc
              ON missions (created_at DESC);
      rollback:
        - sql:
            sql: "DROP INDEX CONCURRENTLY IF EXISTS idx_missions_proposed_team_gin;"
        - sql:
            sql: "DROP INDEX CONCURRENTLY IF EXISTS idx_missions_created_at_desc;"
