databaseChangeLog:
  - changeSet:
      id: "1"
      author: "antigravity"
      changes:
        - createTable:
            tableName: "categories"
            columns:
              - column:
                  name: "id"
                  type: "integer"
                  autoIncrement: true
                  constraints:
                    primaryKey: true
              - column:
                  name: "name"
                  type: "varchar"
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: "description"
                  type: "varchar"
              - column:
                  name: "created_at"
                  type: "datetime"
                  defaultValueDate: "NOW()"
        - createTable:
            tableName: "items"
            columns:
              - column:
                  name: "id"
                  type: "integer"
                  autoIncrement: true
                  constraints:
                    primaryKey: true
              - column:
                  name: "name"
                  type: "varchar"
                  constraints:
                    nullable: false
              - column:
                  name: "description"
                  type: "varchar"
              - column:
                  name: "user_id"
                  type: "integer"
                  constraints:
                    nullable: false
              - column:
                  name: "created_at"
                  type: "datetime"
                  defaultValueDate: "NOW()"
        - createTable:
            tableName: "item_category"
            columns:
              - column:
                  name: "item_id"
                  type: "integer"
                  constraints:
                    primaryKey: true
                    foreignKeyName: "fk_item_category_item"
                    references: "items(id)"
              - column:
                  name: "category_id"
                  type: "integer"
                  constraints:
                    primaryKey: true
                    foreignKeyName: "fk_item_category_category"
                    references: "categories(id)"
      rollback:
        - dropTable:
            tableName: "item_category"
        - dropTable:
            tableName: "items"
        - dropTable:
            tableName: "categories"
  - changeSet:
      id: "2"
      author: "antigravity"
      changes:
        - addColumn:
            tableName: "items"
            columns:
              - column:
                  name: "metadata_json"
                  type: "jsonb"
                  constraints:
                    nullable: true
      rollback:
        - dropColumn:
            tableName: "items"
            columnName: "metadata_json"
  - changeSet:
      id: "3"
      author: "antigravity"
      comment: "Contrainte d'unicité (user_id, name) pour prévenir les missions dupliquées lors des réanalyses CV via Pub/Sub"
      changes:
        - sql:
            # Supprime les doublons (user_id, name) en conservant le plus ancien (id minimal)
            sql: >-
              DELETE FROM items
              WHERE id NOT IN (
                SELECT MIN(id)
                FROM items
                GROUP BY user_id, name
              );
        - addUniqueConstraint:
            tableName: "items"
            columnNames: "user_id, name"
            constraintName: "uq_items_user_name"
      rollback:
        - dropUniqueConstraint:
            tableName: "items"
            constraintName: "uq_items_user_name"
  - changeSet:
      id: "4"
      author: "antigravity"
      comment: "Index de performance items_api — idempotent (IF NOT EXISTS) pour eviter les conflits avec des indexes pre-existants hors Liquibase"
      changes:
        - sql:
            sql: >-
              CREATE INDEX IF NOT EXISTS idx_item_category_category_id
              ON item_category (category_id);
        - sql:
            sql: >-
              CREATE INDEX IF NOT EXISTS idx_items_user_id
              ON items (user_id);
      rollback:
        - sql:
            sql: "DROP INDEX IF EXISTS idx_item_category_category_id;"
        - sql:
            sql: "DROP INDEX IF EXISTS idx_items_user_id;"
  - changeSet:
      id: "5"
      author: "antigravity"
      runInTransaction: false
      comment: "Index de performance P95 — created_at DESC + GIN trgm pour ILIKE. runInTransaction:false requis pour les index GIN."
      changes:
        - sql:
            sql: "CREATE EXTENSION IF NOT EXISTS pg_trgm;"
        - sql:
            sql: >-
              CREATE INDEX IF NOT EXISTS idx_items_created_at
              ON items (created_at DESC);
        - sql:
            sql: >-
              CREATE INDEX IF NOT EXISTS idx_items_name_trgm
              ON items USING gin (name gin_trgm_ops);
        - sql:
            sql: >-
              CREATE INDEX IF NOT EXISTS idx_items_desc_trgm
              ON items USING gin (description gin_trgm_ops);
      rollback:
        - sql:
            sql: "DROP INDEX IF EXISTS idx_items_created_at;"
        - sql:
            sql: "DROP INDEX IF EXISTS idx_items_name_trgm;"
        - sql:
            sql: "DROP INDEX IF EXISTS idx_items_desc_trgm;"
