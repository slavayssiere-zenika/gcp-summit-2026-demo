databaseChangeLog:
  - changeSet:
      id: "1"
      author: "antigravity"
      changes:
        - createTable:
            tableName: "categories"
            columns:
              - column:
                  name: "id"
                  type: "integer"
                  autoIncrement: true
                  constraints:
                    primaryKey: true
              - column:
                  name: "name"
                  type: "varchar"
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: "description"
                  type: "varchar"
              - column:
                  name: "created_at"
                  type: "datetime"
                  defaultValueDate: "NOW()"
        - createTable:
            tableName: "items"
            columns:
              - column:
                  name: "id"
                  type: "integer"
                  autoIncrement: true
                  constraints:
                    primaryKey: true
              - column:
                  name: "name"
                  type: "varchar"
                  constraints:
                    nullable: false
              - column:
                  name: "description"
                  type: "varchar"
              - column:
                  name: "user_id"
                  type: "integer"
                  constraints:
                    nullable: false
              - column:
                  name: "created_at"
                  type: "datetime"
                  defaultValueDate: "NOW()"
        - createTable:
            tableName: "item_category"
            columns:
              - column:
                  name: "item_id"
                  type: "integer"
                  constraints:
                    primaryKey: true
                    foreignKeyName: "fk_item_category_item"
                    references: "items(id)"
              - column:
                  name: "category_id"
                  type: "integer"
                  constraints:
                    primaryKey: true
                    foreignKeyName: "fk_item_category_category"
                    references: "categories(id)"
  - changeSet:
      id: "2"
      author: "antigravity"
      changes:
        - addColumn:
            tableName: "items"
            columns:
              - column:
                  name: "metadata_json"
                  type: "jsonb"
                  constraints:
                    nullable: true
  - changeSet:
      id: "3"
      author: "antigravity"
      comment: "Contrainte d'unicité (user_id, name) pour prévenir les missions dupliquées lors des réanalyses CV via Pub/Sub"
      changes:
        - sql:
            # Supprime les doublons (user_id, name) en conservant le plus ancien (id minimal)
            sql: >-
              DELETE FROM items
              WHERE id NOT IN (
                SELECT MIN(id)
                FROM items
                GROUP BY user_id, name
              );
        - addUniqueConstraint:
            tableName: "items"
            columnNames: "user_id, name"
            constraintName: "uq_items_user_name"
      rollback:
        - dropUniqueConstraint:
            tableName: "items"
            constraintName: "uq_items_user_name"
