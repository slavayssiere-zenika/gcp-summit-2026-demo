databaseChangeLog:
  - changeSet:
      id: "1"
      author: "antigravity"
      changes:
        - sql:
            sql: "CREATE EXTENSION IF NOT EXISTS vector;"
        - createTable:
            tableName: "cv_profiles"
            columns:
              - column:
                  name: "id"
                  type: "integer"
                  autoIncrement: true
                  constraints:
                    primaryKey: true
              - column:
                  name: "user_id"
                  type: "integer"
                  constraints:
                    nullable: false
              - column:
                  name: "source_url"
                  type: "varchar"
              - column:
                  name: "raw_content"
                  type: "text"
                  constraints:
                    nullable: false
              - column:
                  name: "semantic_embedding"
                  type: "vector(3072)"
              - column:
                  name: "created_at"
                  type: "datetime"
                  defaultValueDate: "NOW()"

  - changeSet:
      id: "2"
      author: "antigravity"
      changes:
        - addColumn:
            tableName: "cv_profiles"
            columns:
              - column:
                  name: "imported_by_id"
                  type: "integer"
                  constraints:
                    nullable: true

  - changeSet:
      id: "3"
      author: "antigravity"
      changes:
        - addColumn:
            tableName: "cv_profiles"
            columns:
              - column:
                  name: "source_tag"
                  type: "varchar"
                  constraints:
                    nullable: true
              - column:
                  name: "extracted_competencies"
                  type: "jsonb"
                  constraints:
                    nullable: true

  - changeSet:
      id: "4"
      author: "antigravity"
      changes:
        - addColumn:
            tableName: "cv_profiles"
            columns:
              - column:
                  name: "current_role"
                  type: "varchar"
                  constraints:
                    nullable: true
              - column:
                  name: "years_of_experience"
                  type: "integer"
                  constraints:
                    nullable: true
              - column:
                  name: "summary"
                  type: "text"
                  constraints:
                    nullable: true
              - column:
                  name: "competencies_keywords"
                  type: "text[]"
                  constraints:
                    nullable: true
  - changeSet:
      id: "5"
      author: "antigravity"
      changes:
        - addColumn:
            tableName: "cv_profiles"
            columns:
              - column:
                  name: "missions"
                  type: "jsonb"
                  constraints:
                    nullable: true
  - changeSet:
      id: "6"
      author: "antigravity"
      changes:
        - addColumn:
            tableName: "cv_profiles"
            columns:
              - column:
                  name: "is_anonymous"
                  type: "boolean"
                  defaultValueBoolean: false
                  constraints:
                    nullable: false

  - changeSet:
      id: "7"
      author: "antigravity"
      changes:
        - dropColumn:
            tableName: "cv_profiles"
            columnName: "is_anonymous"

  - changeSet:
      id: "8"
      author: "antigravity"
      changes:
        - addColumn:
            tableName: "cv_profiles"
            columns:
              - column:
                  name: "educations"
                  type: "jsonb"
                  constraints:
                    nullable: true
      rollback:
        - dropColumn:
            tableName: "cv_profiles"
            columnName: "educations"

  - changeSet:
      id: "9"
      author: "antigravity"
      changes:
        - sql:
            sql: |
              -- pgvector HNSW limite les index a 2000 dimensions.
              -- semantic_embedding est vector(3072) -> cast en halfvec(3072)
              -- (precision float16, supporte pgvector >= 0.7 / AlloyDB PG17)
              CREATE INDEX IF NOT EXISTS idx_cv_embedding_hnsw
              ON cv_profiles
              USING hnsw ((semantic_embedding::halfvec(3072)) halfvec_cosine_ops)
              WITH (m = 16, ef_construction = 64);
      rollback:
        - sql:
            sql: "DROP INDEX IF EXISTS idx_cv_embedding_hnsw;"

