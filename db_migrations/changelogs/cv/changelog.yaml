databaseChangeLog:
  - changeSet:
      id: "1"
      author: "antigravity"
      changes:
        - sql:
            sql: "CREATE EXTENSION IF NOT EXISTS vector;"
        - createTable:
            tableName: "cv_profiles"
            columns:
              - column:
                  name: "id"
                  type: "integer"
                  autoIncrement: true
                  constraints:
                    primaryKey: true
              - column:
                  name: "user_id"
                  type: "integer"
                  constraints:
                    nullable: false
              - column:
                  name: "source_url"
                  type: "varchar"
              - column:
                  name: "raw_content"
                  type: "text"
                  constraints:
                    nullable: false
              - column:
                  name: "semantic_embedding"
                  type: "vector(3072)"
              - column:
                  name: "created_at"
                  type: "datetime"
                  defaultValueDate: "NOW()"
      rollback:
        - dropTable:
            tableName: "cv_profiles"

  - changeSet:
      id: "2"
      author: "antigravity"
      changes:
        - addColumn:
            tableName: "cv_profiles"
            columns:
              - column:
                  name: "imported_by_id"
                  type: "integer"
                  constraints:
                    nullable: true
      rollback:
        - dropColumn:
            tableName: "cv_profiles"
            columnName: "imported_by_id"

  - changeSet:
      id: "3"
      author: "antigravity"
      changes:
        - addColumn:
            tableName: "cv_profiles"
            columns:
              - column:
                  name: "source_tag"
                  type: "varchar"
                  constraints:
                    nullable: true
              - column:
                  name: "extracted_competencies"
                  type: "jsonb"
                  constraints:
                    nullable: true
      rollback:
        - dropColumn:
            tableName: "cv_profiles"
            columnName: "source_tag"
        - dropColumn:
            tableName: "cv_profiles"
            columnName: "extracted_competencies"

  - changeSet:
      id: "4"
      author: "antigravity"
      changes:
        - addColumn:
            tableName: "cv_profiles"
            columns:
              - column:
                  name: "current_role"
                  type: "varchar"
                  constraints:
                    nullable: true
              - column:
                  name: "years_of_experience"
                  type: "integer"
                  constraints:
                    nullable: true
              - column:
                  name: "summary"
                  type: "text"
                  constraints:
                    nullable: true
              - column:
                  name: "competencies_keywords"
                  type: "text[]"
                  constraints:
                    nullable: true
      rollback:
        - dropColumn:
            tableName: "cv_profiles"
            columnName: "current_role"
        - dropColumn:
            tableName: "cv_profiles"
            columnName: "years_of_experience"
        - dropColumn:
            tableName: "cv_profiles"
            columnName: "summary"
        - dropColumn:
            tableName: "cv_profiles"
            columnName: "competencies_keywords"
  - changeSet:
      id: "5"
      author: "antigravity"
      changes:
        - addColumn:
            tableName: "cv_profiles"
            columns:
              - column:
                  name: "missions"
                  type: "jsonb"
                  constraints:
                    nullable: true
      rollback:
        - dropColumn:
            tableName: "cv_profiles"
            columnName: "missions"
  - changeSet:
      id: "6"
      author: "antigravity"
      changes:
        - addColumn:
            tableName: "cv_profiles"
            columns:
              - column:
                  name: "is_anonymous"
                  type: "boolean"
                  defaultValueBoolean: false
                  constraints:
                    nullable: false
      rollback:
        - dropColumn:
            tableName: "cv_profiles"
            columnName: "is_anonymous"

  - changeSet:
      id: "7"
      author: "antigravity"
      changes:
        - dropColumn:
            tableName: "cv_profiles"
            columnName: "is_anonymous"
      rollback:
        - addColumn:
            tableName: "cv_profiles"
            columns:
              - column:
                  name: "is_anonymous"
                  type: "boolean"
                  defaultValueBoolean: false
                  constraints:
                    nullable: false

  - changeSet:
      id: "8"
      author: "antigravity"
      changes:
        - addColumn:
            tableName: "cv_profiles"
            columns:
              - column:
                  name: "educations"
                  type: "jsonb"
                  constraints:
                    nullable: true
      rollback:
        - dropColumn:
            tableName: "cv_profiles"
            columnName: "educations"

  - changeSet:
      id: "9"
      author: "antigravity"
      changes:
        - sql:
            sql: |
              -- pgvector HNSW limite les index a 2000 dimensions.
              -- semantic_embedding est vector(3072) -> cast en halfvec(3072)
              -- (precision float16, supporte pgvector >= 0.7 / AlloyDB PG17)
              CREATE INDEX IF NOT EXISTS idx_cv_embedding_hnsw
              ON cv_profiles
              USING hnsw ((semantic_embedding::halfvec(3072)) halfvec_cosine_ops)
              WITH (m = 16, ef_construction = 64);
      rollback:
        - sql:
            sql: "DROP INDEX IF EXISTS idx_cv_embedding_hnsw;"

  - changeSet:
      id: "10"
      author: "antigravity"
      changes:
        - addColumn:
            tableName: "cv_profiles"
            columns:
              - column:
                  name: "is_archived"
                  type: "boolean"
                  defaultValueBoolean: false
                  constraints:
                    nullable: false
      rollback:
        - dropColumn:
            tableName: "cv_profiles"
            columnName: "is_archived"

  - changeSet:
      id: "11"
      author: "antigravity"
      changes:
        - addColumn:
            tableName: "cv_profiles"
            columns:
              - column:
                  name: "extraction_reliability_score"
                  type: "integer"
                  constraints:
                    nullable: true
      rollback:
        - dropColumn:
            tableName: "cv_profiles"
            columnName: "extraction_reliability_score"

  - changeSet:
      id: "12"
      author: "antigravity"
      comment: "R1 — Versionning modele embedding : trace le modele utilise pour chaque vecteur"
      changes:
        - addColumn:
            tableName: "cv_profiles"
            columns:
              - column:
                  name: "embedding_model"
                  type: "varchar(100)"
                  constraints:
                    nullable: true
        - sql:
            sql: "CREATE INDEX IF NOT EXISTS idx_cv_embedding_model ON cv_profiles (embedding_model);"
      rollback:
        - sql:
            sql: "DROP INDEX IF EXISTS idx_cv_embedding_model;"
        - dropColumn:
            tableName: "cv_profiles"
            columnName: "embedding_model"


  - changeSet:
      id: "13"
      author: "antigravity"
      comment: "R7 — Chunking par mission : table cv_mission_embeddings pour le RAG multi-vecteur"
      preConditions:
        onFail: MARK_RAN
        not:
          tableExists:
            tableName: "cv_mission_embeddings"
      changes:
        - createTable:
            tableName: "cv_mission_embeddings"
            columns:
              - column:
                  name: "id"
                  type: "integer"
                  autoIncrement: true
                  constraints:
                    primaryKey: true
              - column:
                  name: "cv_profile_id"
                  type: "integer"
                  constraints:
                    nullable: false
              - column:
                  name: "user_id"
                  type: "integer"
                  constraints:
                    nullable: false
              - column:
                  name: "mission_index"
                  type: "integer"
                  constraints:
                    nullable: false
              - column:
                  name: "chunk_type"
                  type: "varchar(50)"
                  constraints:
                    nullable: false
              - column:
                  name: "chunk_text"
                  type: "text"
                  constraints:
                    nullable: false
              - column:
                  name: "chunk_embedding"
                  type: "vector(3072)"
                  constraints:
                    nullable: true
              - column:
                  name: "embedding_model"
                  type: "varchar(100)"
                  constraints:
                    nullable: true
              - column:
                  name: "source_tag"
                  type: "varchar(255)"
                  constraints:
                    nullable: true
              - column:
                  name: "created_at"
                  type: "datetime"
                  defaultValueDate: "NOW()"
        - sql:
            sql: >
              CREATE INDEX IF NOT EXISTS idx_mission_emb_user_id
              ON cv_mission_embeddings (user_id);
              CREATE INDEX IF NOT EXISTS idx_mission_emb_cv_profile_id
              ON cv_mission_embeddings (cv_profile_id);
              CREATE INDEX IF NOT EXISTS idx_mission_emb_model
              ON cv_mission_embeddings (embedding_model);
              CREATE INDEX IF NOT EXISTS idx_mission_emb_hnsw
              ON cv_mission_embeddings
              USING hnsw ((chunk_embedding::halfvec(3072)) halfvec_cosine_ops)
              WITH (m = 16, ef_construction = 64);
      rollback:
        - sql:
            sql: >
              DROP INDEX IF EXISTS idx_mission_emb_hnsw;
              DROP INDEX IF EXISTS idx_mission_emb_model;
              DROP INDEX IF EXISTS idx_mission_emb_cv_profile_id;
              DROP INDEX IF EXISTS idx_mission_emb_user_id;
        - dropTable:
            tableName: "cv_mission_embeddings"

  - changeSet:
      id: "14"
      author: "antigravity"
      comment: "Stockage des erreurs de post-traitement (assignation compétences, missions) — rend les échecs fonctionnels visibles et auditables"
      changes:
        - addColumn:
            tableName: "cv_profiles"
            columns:
              - column:
                  name: "processing_errors"
                  type: "jsonb"
                  defaultValueComputed: "'[]'::jsonb"
                  constraints:
                    nullable: true
      rollback:
        - dropColumn:
            tableName: "cv_profiles"
            columnName: "processing_errors"
