databaseChangeLog:
  - changeSet:
      id: "1"
      author: "antigravity"
      changes:
        - createTable:
            tableName: "drive_folders"
            columns:
              - column:
                  name: "id"
                  type: "integer"
                  autoIncrement: true
                  constraints:
                    primaryKey: true
              - column:
                  name: "google_folder_id"
                  type: "varchar"
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: "tag"
                  type: "varchar"
                  constraints:
                    nullable: false
              - column:
                  name: "created_at"
                  type: "datetime"
                  defaultValueDate: "NOW()"

  - changeSet:
      id: "2"
      author: "antigravity"
      changes:
        - createTable:
            tableName: "drive_sync_state"
            columns:
              - column:
                  name: "google_file_id"
                  type: "varchar"
                  constraints:
                    primaryKey: true
              - column:
                  name: "folder_id"
                  type: "integer"
                  constraints:
                    nullable: true
                    foreignKeyName: "fk_drive_sync_folder"
                    references: "drive_folders(id)"
              - column:
                  name: "revision_id"
                  type: "varchar"
                  constraints:
                    nullable: true
              - column:
                  name: "status"
                  type: "varchar"
                  defaultValue: "PENDING"
              - column:
                  name: "modified_time"
                  type: "datetime"
                  constraints:
                    nullable: true
              - column:
                  name: "last_processed_at"
                  type: "datetime"
                  defaultValueDate: "NOW()"

  - changeSet:
      id: "3"
      author: "antigravity"
      changes:
        - addColumn:
            tableName: "drive_sync_state"
            columns:
              - column:
                  name: "file_name"
                  type: "varchar"
                  constraints:
                    nullable: true

  - changeSet:
      id: "4"
      author: "antigravity"
      changes:
        - addColumn:
            tableName: "drive_sync_state"
            columns:
              - column:
                  name: "user_id"
                  type: "integer"
                  constraints:
                    nullable: true

  - changeSet:
      id: "5"
      author: "antigravity"
      comment: "Ajout du nom du dossier Drive racine (nomenclature Zenika Prénom Nom)"
      changes:
        - addColumn:
            tableName: "drive_folders"
            columns:
              - column:
                  name: "folder_name"
                  type: "varchar(255)"
                  constraints:
                    nullable: true
      rollback:
        - dropColumn:
            tableName: "drive_folders"
            columnName: "folder_name"

  - changeSet:
      id: "6"
      author: "antigravity"
      comment: "Ajout du nom du dossier parent direct du fichier (résolution identité Zenika)"
      changes:
        - addColumn:
            tableName: "drive_sync_state"
            columns:
              - column:
                  name: "parent_folder_name"
                  type: "varchar(255)"
                  constraints:
                    nullable: true
      rollback:
        - dropColumn:
            tableName: "drive_sync_state"
            columnName: "parent_folder_name"

  - changeSet:
      id: "7"
      author: "antigravity"
      comment: "Ajout flag d'initialisation de sync pour eviter de court-circuiter l'historique lors de la decouverte d'un nouveau dossier"
      changes:
        - addColumn:
            tableName: "drive_folders"
            columns:
              - column:
                  name: "is_initial_sync_done"
                  type: "boolean"
                  defaultValueBoolean: false
      rollback:
        - dropColumn:
            tableName: "drive_folders"
            columnName: "is_initial_sync_done"

  - changeSet:
      id: "8"
      author: "antigravity"
      comment: "Ajout du message d'erreur pour les imports echoues"
      changes:
        - addColumn:
            tableName: "drive_sync_state"
            columns:
               - column:
                   name: "error_message"
                   type: "text"
                   constraints:
                     nullable: true
      rollback:
        - dropColumn:
            tableName: "drive_sync_state"
            columnName: "error_message"

  - changeSet:
      id: "9"
      author: "antigravity"
      comment: "Ajout du statut QUEUED dans le pipeline d'ingestion CV (Pub/Sub event-driven)"
      changes:
        - sql:
            sql: "UPDATE drive_sync_state SET status = 'PENDING' WHERE status NOT IN ('PENDING', 'PROCESSING', 'IMPORTED_CV', 'IGNORED_NOT_CV', 'ERROR')"
            comment: "Nettoyage préventif des statuts inconnus avant migration"
      rollback:
        - sql:
            sql: "-- Pas de rollback nécessaire : le statut QUEUED sera simplement ignoré par les anciennes versions"
            comment: "Rollback no-op : la suppression de QUEUED ne nécessite pas de migration DB (colonne varchar libre)"

  - changeSet:
      id: "10"
      author: "antigravity"
      comment: "Ajout ON DELETE CASCADE sur la FK fk_drive_sync_folder — permet la suppression atomique d'un dossier avec ses fichiers trackés sans ForeignKeyViolationError"
      changes:
        - dropForeignKeyConstraint:
            baseTableName: "drive_sync_state"
            constraintName: "fk_drive_sync_folder"
        - addForeignKeyConstraint:
            baseTableName: "drive_sync_state"
            baseColumnNames: "folder_id"
            constraintName: "fk_drive_sync_folder"
            referencedTableName: "drive_folders"
            referencedColumnNames: "id"
            onDelete: "CASCADE"
      rollback:
        - dropForeignKeyConstraint:
            baseTableName: "drive_sync_state"
            constraintName: "fk_drive_sync_folder"
        - addForeignKeyConstraint:
            baseTableName: "drive_sync_state"
            baseColumnNames: "folder_id"
            constraintName: "fk_drive_sync_folder"
            referencedTableName: "drive_folders"
            referencedColumnNames: "id"

