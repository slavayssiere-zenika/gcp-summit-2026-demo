databaseChangeLog:
  - changeSet:
      id: "1"
      author: "antigravity"
      changes:
        - createTable:
            tableName: "drive_folders"
            columns:
              - column:
                  name: "id"
                  type: "integer"
                  autoIncrement: true
                  constraints:
                    primaryKey: true
              - column:
                  name: "google_folder_id"
                  type: "varchar"
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: "tag"
                  type: "varchar"
                  constraints:
                    nullable: false
              - column:
                  name: "created_at"
                  type: "datetime"
                  defaultValueDate: "NOW()"

  - changeSet:
      id: "2"
      author: "antigravity"
      changes:
        - createTable:
            tableName: "drive_sync_state"
            columns:
              - column:
                  name: "google_file_id"
                  type: "varchar"
                  constraints:
                    primaryKey: true
              - column:
                  name: "folder_id"
                  type: "integer"
                  constraints:
                    nullable: true
                    foreignKeyName: "fk_drive_sync_folder"
                    references: "drive_folders(id)"
              - column:
                  name: "revision_id"
                  type: "varchar"
                  constraints:
                    nullable: true
              - column:
                  name: "status"
                  type: "varchar"
                  defaultValue: "PENDING"
              - column:
                  name: "modified_time"
                  type: "datetime"
                  constraints:
                    nullable: true
              - column:
                  name: "last_processed_at"
                  type: "datetime"
                  defaultValueDate: "NOW()"

  - changeSet:
      id: "3"
      author: "antigravity"
      changes:
        - addColumn:
            tableName: "drive_sync_state"
            columns:
              - column:
                  name: "file_name"
                  type: "varchar"
                  constraints:
                    nullable: true
