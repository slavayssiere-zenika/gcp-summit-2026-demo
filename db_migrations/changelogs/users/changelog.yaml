databaseChangeLog:
  - changeSet:
      id: "1"
      author: "antigravity"
      changes:
        - createTable:
            tableName: "users"
            columns:
              - column:
                  name: "id"
                  type: "integer"
                  autoIncrement: true
                  constraints:
                    primaryKey: true
              - column:
                  name: "username"
                  type: "varchar"
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: "email"
                  type: "varchar"
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: "first_name"
                  type: "varchar"
              - column:
                  name: "last_name"
                  type: "varchar"
              - column:
                  name: "full_name"
                  type: "varchar"
              - column:
                  name: "is_active"
                  type: "boolean"
                  defaultValueBoolean: true
              - column:
                  name: "hashed_password"
                  type: "varchar"
                  constraints:
                    nullable: false
              - column:
                  name: "role"
                  type: "varchar"
                  defaultValue: "user"
                  constraints:
                    nullable: false
              - column:
                  name: "allowed_category_ids"
                  type: "varchar"
                  defaultValue: ""
              - column:
                  name: "created_at"
                  type: "datetime"
                  defaultValueDate: "NOW()"
  - changeSet:
      id: "2"
      author: "antigravity"
      changes:
        - addColumn:
            tableName: "users"
            columns:
              - column:
                  name: "picture_url"
                  type: "varchar"
              - column:
                  name: "google_id"
                  type: "varchar"
  - changeSet:
      id: "3"
      author: "antigravity"
      changes:
        - addColumn:
            tableName: "users"
            columns:
              - column:
                  name: "merged_into_id"
                  type: "integer"
                  constraints:
                    nullable: true
                    foreignKeyName: "fk_users_merged_into"
                    references: "users(id)"
