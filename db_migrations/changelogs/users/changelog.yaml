databaseChangeLog:
  - changeSet:
      id: "1"
      author: "antigravity"
      changes:
        - createTable:
            tableName: "users"
            columns:
              - column:
                  name: "id"
                  type: "integer"
                  autoIncrement: true
                  constraints:
                    primaryKey: true
              - column:
                  name: "username"
                  type: "varchar"
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: "email"
                  type: "varchar"
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: "first_name"
                  type: "varchar"
              - column:
                  name: "last_name"
                  type: "varchar"
              - column:
                  name: "full_name"
                  type: "varchar"
              - column:
                  name: "is_active"
                  type: "boolean"
                  defaultValueBoolean: true
              - column:
                  name: "hashed_password"
                  type: "varchar"
                  constraints:
                    nullable: false
              - column:
                  name: "role"
                  type: "varchar"
                  defaultValue: "user"
                  constraints:
                    nullable: false
              - column:
                  name: "allowed_category_ids"
                  type: "varchar"
                  defaultValue: ""
              - column:
                  name: "created_at"
                  type: "datetime"
                  defaultValueDate: "NOW()"
      rollback:
        - dropTable:
            tableName: "users"
  - changeSet:
      id: "2"
      author: "antigravity"
      changes:
        - addColumn:
            tableName: "users"
            columns:
              - column:
                  name: "picture_url"
                  type: "varchar"
              - column:
                  name: "google_id"
                  type: "varchar"
      rollback:
        - dropColumn:
            tableName: "users"
            columnName: "picture_url"
        - dropColumn:
            tableName: "users"
            columnName: "google_id"
  - changeSet:
      id: "3"
      author: "antigravity"
      changes:
        - addColumn:
            tableName: "users"
            columns:
              - column:
                  name: "merged_into_id"
                  type: "integer"
                  constraints:
                    nullable: true
                    foreignKeyName: "fk_users_merged_into"
                    references: "users(id)"
      rollback:
        - dropColumn:
            tableName: "users"
            columnName: "merged_into_id"
  - changeSet:
      id: "4"
      author: "antigravity"
      changes:
        - addColumn:
            tableName: "users"
            columns:
              - column:
                  name: "is_anonymous"
                  type: "boolean"
                  defaultValueBoolean: false
                  constraints:
                    nullable: false
      rollback:
        - dropColumn:
            tableName: "users"
            columnName: "is_anonymous"

  - changeSet:
      id: "5"
      author: "antigravity"
      changes:
        - sql:
            sql: "UPDATE users SET email = CAST(id AS VARCHAR) || '@zenika.com' WHERE email IS NULL OR email = ''"
        - addNotNullConstraint:
            tableName: "users"
            columnName: "email"
            columnDataType: "varchar"
      rollback:
        - sql:
            sql: "-- Rollback no-op : impossible de restaurer les NULL sans snapshot préalable"

  - changeSet:
      id: "6"
      author: "antigravity"
      changes:
        - addColumn:
            tableName: "users"
            columns:
              - column:
                  name: "unavailability_periods"
                  type: "json"
                  defaultValue: "[]"
      rollback:
        - dropColumn:
            tableName: "users"
            columnName: "unavailability_periods"

  - changeSet:
      id: "7"
      author: "antigravity"
      comment: "Ajout du champ seniority pour le staffing IA (Junior/Mid/Senior). Editable manuellement par l'admin ou inféré depuis le CV."
      changes:
        - addColumn:
            tableName: "users"
            columns:
              - column:
                  name: "seniority"
                  type: "varchar(20)"
                  constraints:
                    nullable: true
      rollback:
        - dropColumn:
            tableName: "users"
            columnName: "seniority"

  - changeSet:
      id: "8"
      author: "antigravity"
      comment: "Ajout de la table user_audit_logs pour tracer les changements de statut, rôle et séniorité."
      changes:
        - createTable:
            tableName: "user_audit_logs"
            columns:
              - column:
                  name: "id"
                  type: "integer"
                  autoIncrement: true
                  constraints:
                    primaryKey: true
              - column:
                  name: "user_id"
                  type: "integer"
                  constraints:
                    nullable: false
                    foreignKeyName: "fk_user_audit_logs_user"
                    references: "users(id)"
              - column:
                  name: "admin_username"
                  type: "varchar"
                  constraints:
                    nullable: false
              - column:
                  name: "action"
                  type: "varchar"
                  constraints:
                    nullable: false
              - column:
                  name: "field_changed"
                  type: "varchar"
              - column:
                  name: "old_value"
                  type: "varchar"
              - column:
                  name: "new_value"
                  type: "varchar"
              - column:
                  name: "timestamp"
                  type: "datetime"
                  defaultValueDate: "NOW()"
      rollback:
        - dropTable:
            tableName: "user_audit_logs"

  - changeSet:
      id: "9"
      author: "security-audit-2026-04-30"
      comment: "Contrainte CHECK sur role pour bloquer les valeurs hors domaine. Pré-migration : normalise les éventuels rôles invalides en 'user' avant d'ajouter la contrainte."
      changes:
        - sql:
            sql: |
              UPDATE users
              SET role = 'user'
              WHERE role NOT IN ('user', 'rh', 'commercial', 'admin', 'service_account');

              ALTER TABLE users
              ADD CONSTRAINT chk_users_role
              CHECK (role IN ('user', 'rh', 'commercial', 'admin', 'service_account'));
      rollback:
        - sql:
            sql: ALTER TABLE users DROP CONSTRAINT IF EXISTS chk_users_role;

  - changeSet:
      id: "10"
      author: "antigravity"
      runInTransaction: false
      comment: >
        P2 perf — Index sur users pour reduire le P95 sous charge (500u stress test).
        Cibles identifiees par analyse Locust : GET /users/ (filtre is_anonymous),
        GET /users/search (ILIKE full_name/email/first_name/last_name/username),
        GET /users/duplicates (scan complet ordonne par created_at).
        pg_trgm requis pour les recherches ILIKE trigram (operateur %).
        runInTransaction: false requis pour CONCURRENTLY.
      changes:
        - sql:
            dbms: postgresql
            sql: "CREATE EXTENSION IF NOT EXISTS pg_trgm;"
        - sql:
            dbms: postgresql
            sql: >-
              CREATE INDEX CONCURRENTLY IF NOT EXISTS idx_users_is_anonymous
              ON users (is_anonymous, created_at DESC);
        - sql:
            dbms: postgresql
            sql: >-
              CREATE INDEX CONCURRENTLY IF NOT EXISTS idx_users_full_name_trgm
              ON users USING GIN (full_name gin_trgm_ops);
        - sql:
            dbms: postgresql
            sql: >-
              CREATE INDEX CONCURRENTLY IF NOT EXISTS idx_users_email_trgm
              ON users USING GIN (email gin_trgm_ops);
        - sql:
            dbms: postgresql
            sql: >-
              CREATE INDEX CONCURRENTLY IF NOT EXISTS idx_users_created_at_desc
              ON users (created_at DESC);
      rollback:
        - sql:
            sql: "DROP INDEX CONCURRENTLY IF EXISTS idx_users_is_anonymous;"
        - sql:
            sql: "DROP INDEX CONCURRENTLY IF EXISTS idx_users_full_name_trgm;"
        - sql:
            sql: "DROP INDEX CONCURRENTLY IF EXISTS idx_users_email_trgm;"
        - sql:
            sql: "DROP INDEX CONCURRENTLY IF EXISTS idx_users_created_at_desc;"
