databaseChangeLog:
  - changeSet:
      id: "1"
      author: "antigravity"
      changes:
        - createTable:
            tableName: "users"
            columns:
              - column:
                  name: "id"
                  type: "integer"
                  autoIncrement: true
                  constraints:
                    primaryKey: true
              - column:
                  name: "username"
                  type: "varchar"
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: "email"
                  type: "varchar"
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: "first_name"
                  type: "varchar"
              - column:
                  name: "last_name"
                  type: "varchar"
              - column:
                  name: "full_name"
                  type: "varchar"
              - column:
                  name: "is_active"
                  type: "boolean"
                  defaultValueBoolean: true
              - column:
                  name: "hashed_password"
                  type: "varchar"
                  constraints:
                    nullable: false
              - column:
                  name: "role"
                  type: "varchar"
                  defaultValue: "user"
                  constraints:
                    nullable: false
              - column:
                  name: "allowed_category_ids"
                  type: "varchar"
                  defaultValue: ""
              - column:
                  name: "created_at"
                  type: "datetime"
                  defaultValueDate: "NOW()"
  - changeSet:
      id: "2"
      author: "antigravity"
      changes:
        - addColumn:
            tableName: "users"
            columns:
              - column:
                  name: "picture_url"
                  type: "varchar"
              - column:
                  name: "google_id"
                  type: "varchar"
  - changeSet:
      id: "3"
      author: "antigravity"
      changes:
        - addColumn:
            tableName: "users"
            columns:
              - column:
                  name: "merged_into_id"
                  type: "integer"
                  constraints:
                    nullable: true
                    foreignKeyName: "fk_users_merged_into"
                    references: "users(id)"
  - changeSet:
      id: "4"
      author: "antigravity"
      changes:
        - addColumn:
            tableName: "users"
            columns:
              - column:
                  name: "is_anonymous"
                  type: "boolean"
                  defaultValueBoolean: false
                  constraints:
                    nullable: false

  - changeSet:
      id: "5"
      author: "antigravity"
      changes:
        - sql:
            sql: "UPDATE users SET email = CAST(id AS VARCHAR) || '@zenika.com' WHERE email IS NULL OR email = ''"
        - addNotNullConstraint:
            tableName: "users"
            columnName: "email"
            columnDataType: "varchar"

  - changeSet:
      id: "6"
      author: "antigravity"
      changes:
        - addColumn:
            tableName: "users"
            columns:
              - column:
                  name: "unavailability_periods"
                  type: "json"
                  defaultValue: "[]"

  - changeSet:
      id: "7"
      author: "antigravity"
      comment: "Ajout du champ seniority pour le staffing IA (Junior/Mid/Senior). Editable manuellement par l'admin ou inféré depuis le CV."
      changes:
        - addColumn:
            tableName: "users"
            columns:
              - column:
                  name: "seniority"
                  type: "varchar(20)"
                  constraints:
                    nullable: true
      rollback:
        - dropColumn:
            tableName: "users"
            columnName: "seniority"

  - changeSet:
      id: "8"
      author: "antigravity"
      comment: "Ajout de la table user_audit_logs pour tracer les changements de statut, rôle et séniorité."
      changes:
        - createTable:
            tableName: "user_audit_logs"
            columns:
              - column:
                  name: "id"
                  type: "integer"
                  autoIncrement: true
                  constraints:
                    primaryKey: true
              - column:
                  name: "user_id"
                  type: "integer"
                  constraints:
                    nullable: false
                    foreignKeyName: "fk_user_audit_logs_user"
                    references: "users(id)"
              - column:
                  name: "admin_username"
                  type: "varchar"
                  constraints:
                    nullable: false
              - column:
                  name: "action"
                  type: "varchar"
                  constraints:
                    nullable: false
              - column:
                  name: "field_changed"
                  type: "varchar"
              - column:
                  name: "old_value"
                  type: "varchar"
              - column:
                  name: "new_value"
                  type: "varchar"
              - column:
                  name: "timestamp"
                  type: "datetime"
                  defaultValueDate: "NOW()"
      rollback:
        - dropTable:
            tableName: "user_audit_logs"
