[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = --tb=short -q
markers =
    integration: Tests d'intégration nécessitant Docker + pgvector (JSONB, ARRAY, Vector)
filterwarnings =
    ignore:.*authlib.jose module is deprecated.*:Warning
asyncio_mode = auto
