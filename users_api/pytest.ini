[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = --tb=short -q
markers =
    integration: Tests d'intégration nécessitant Docker + PostgreSQL + Redis (toujours actifs)
    contract: Tests de contrat schemathesis (OpenAPI schema conformance, mode ASGI)
filterwarnings =
    ignore:.*authlib.jose module is deprecated.*:Warning
    ignore:.*wait_container_is_ready.*:DeprecationWarning
