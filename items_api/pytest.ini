[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = --tb=short -q
markers =
    contract: Tests de contrat schemathesis (OpenAPI schema conformance, mode ASGI)
    integration: Tests d'intégration nécessitant Docker (toujours actifs)
filterwarnings =
    ignore:.*authlib.jose module is deprecated.*:Warning
    ignore:.*wait_container_is_ready decorator is deprecated.*:DeprecationWarning
