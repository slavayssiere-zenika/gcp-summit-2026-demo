global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'users-api'
    metrics_path: /metrics
    static_configs:
      - targets: ['users_api:8000']

  - job_name: 'items-api'
    metrics_path: /metrics
    static_configs:
      - targets: ['items_api:8001']

  - job_name: 'cv-api'
    metrics_path: /metrics
    static_configs:
      - targets: ['cv_api:8004']

  - job_name: 'competencies-api'
    metrics_path: /metrics
    static_configs:
      - targets: ['competencies_api:8003']

  - job_name: 'drive-api'
    metrics_path: /metrics
    static_configs:
      - targets: ['drive_api:8006']

  - job_name: 'prompts-api'
    metrics_path: /metrics
    static_configs:
      - targets: ['prompts_api:8005']

  - job_name: 'missions-api'
    metrics_path: /metrics
    static_configs:
      - targets: ['missions_api:8009']

  - job_name: 'agent-router-api'
    metrics_path: /metrics
    static_configs:
      - targets: ['agent_router_api:8080']

  - job_name: 'agent-hr-api'
    metrics_path: /metrics
    static_configs:
      - targets: ['agent_hr_api:8080']

  - job_name: 'agent-ops-api'
    metrics_path: /metrics
    static_configs:
      - targets: ['agent_ops_api:8080']

  - job_name: 'agent-missions-api'
    metrics_path: /metrics
    static_configs:
      - targets: ['agent_missions_api:8080']

  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres_exporter:9187']

  - job_name: 'redis'
    static_configs:
      - targets: ['redis_exporter:9121']

  - job_name: 'frontend-nginx'
    metrics_path: /metrics
    static_configs:
      - targets: ['frontend:80']
