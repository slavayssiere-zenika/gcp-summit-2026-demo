[pytest]
# tests/ contient les tests organisés par feature
# . inclut les 3 fichiers test_*.py à la racine du service (test_client.py, test_fastapi.py, test_validation.py)
testpaths = tests .
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = --tb=short -q
markers =
    integration: Tests d'intégration nécessitant Docker + pgvector (toujours actifs)
filterwarnings =
    ignore:.*authlib.jose module is deprecated.*:Warning
